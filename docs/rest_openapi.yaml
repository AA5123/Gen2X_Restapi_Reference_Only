openapi: 3.1.0
info:
  title: IoT Connector REST API
  description: |-
    # Overview

    FXR90 reader can be controlled using REST API as documented in this page.
    The definition can be found below.

    # Authentication

    If bearer token is previously copied from dashboard page, use it in `Authorize` bearerAuth.
    If not, use Admin login credentials in `Authorize` basicAuth, execute `/cloud/localRestLogin`,
    and copy the bearer token from the response for `Authorize` bearerAuth.
  version: 3.0.0
  termsOfService: https://www.zebra.com/ap/en/terms-conditions.html
  contact:
    name: API Support
    url: https://www.zebra.com/ap/en/support-downloads/rfid.html
externalDocs:
  description: Find out more about IoT
  url: https://zebradevs.github.io/rfid-ziotc-docs/
servers:
  - url: '{url}'
    description: Device REST API base URL
    variables:
      url:
        default: http://<device-ip>:<port>
        description: Example base URL for the target device
tags:
  - name: Tag Protection
    description: Impinj TagProtect prevents unauthorized cloning and reading of tags using a password-based protection mechanism. It renders a tag invisible to an RFID reader unless the correct 32-bit password is provided.
  - name: FastID
    description: Impinj FastID embeds the tag TID along with the EPC in every inventory response, eliminating the need for separate TID read operations and improving throughput.
  - name: TagFocus
    description: Impinj TagFocus instructs tags that have already been inventoried to remain unresponsive, enabling the reader to focus on other unread tags. Targets tags in session S1.
  - name: Tag Quieting
    description: Impinj TagQuieting selectively silences individual tags to reduce tag churn and improve read accuracy in dense tag environments.
  - name: Gen2X Configuration Retrieval
    description: Retrieve the current Gen2X feature configuration from the reader.
  - name: Control Commands
    description: Start and stop the radio while applying Gen2X configuration.
x-tagGroups:
  - name: Tag Protection
    tags:
      - Tag Protection
  - name: Inventory Features
    tags:
      - FastID
      - TagFocus
      - Tag Quieting
  - name: Configuration & Control
    tags:
      - Gen2X Configuration Retrieval
      - Control Commands
paths:
  /cloud/impinjGen2X:
    get:
      tags:
        - Gen2X Configuration Retrieval
      summary: Get Impinj Gen2X configuration
      description: >-
        MQTT API :- get_impinjGen2X <br> Retrieves the current Impinj Gen2X feature
        configuration as last saved via set_impinjGen2X. Returns an empty object if no
        Gen2X configuration has been set yet. Only feature objects that were previously
        configured are included in the response.
      operationId: getImpinjGen2X
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: >-
                  Current Impinj Gen2X feature configuration as last saved via set_impinjGen2X.
                  Returns an empty object if no Gen2X configuration has been set yet.
                  Only feature objects that were previously configured are included in the response.
                properties:
                  fastID:
                    type: object
                    description: FastID configuration. Present only if fastID was previously configured.
                    properties:
                      enabled:
                        type: boolean
                        description: Whether FastID is enabled.
                        example: true
                      tidSelector:
                        type: string
                        description: TID word selector mask, if one was configured.
                        enum:
                          - TID[0]
                          - TID[1]
                          - TID[2]
                          - TID[3]
                        example: TID[0]
                    required:
                      - enabled
                  tagProtect:
                    type: object
                    description: TagProtect configuration. Present only if tagProtect was previously configured.
                    properties:
                      action:
                        type: string
                        description: Last configured protection action.
                        enum:
                          - enableTagProtection
                          - disableTagProtection
                          - enableTagVisibility
                          - disableTagVisibility
                        example: enableTagProtection
                      password:
                        type: string
                        description: 8-character hexadecimal 32-bit password.
                        minLength: 8
                        maxLength: 8
                        pattern: ^[0-9A-Fa-f]{8}$
                        example: '77777777'
                      tagID:
                        type: string
                        description: >-
                          Hexadecimal tagID (EPC) of the target tag.
                          Only present when action is enableTagProtection or disableTagProtection.
                        pattern: ^[0-9A-Fa-f]+$
                        example: e2801191a5030069073b426d
                      enableShortRange:
                        type: boolean
                        description: Whether short-range protection mode is enabled.
                        example: true
                    required:
                      - action
                      - password
                  tagFocus:
                    type: object
                    description: TagFocus configuration. Present only if tagFocus was previously configured.
                    properties:
                      enabled:
                        type: boolean
                        description: Whether TagFocus is enabled.
                        example: true
                    required:
                      - enabled
                  tagQuieting:
                    type: object
                    description: TagQuieting configuration. Present only if tagQuieting was previously configured.
                    properties:
                      basic:
                        type: object
                        description: Basic TagQuieting configuration.
                        properties:
                          action:
                            type: string
                            description: Last configured quiet action.
                            enum:
                              - quiet
                              - unquiet
                            example: quiet
                          tagIDs:
                            type: array
                            description: List of tag IDs (EPC strings) that are to be quieted or unquieted.
                            items:
                              type: string
                              pattern: ^[0-9A-Fa-f]+$
                              example: e2801191a5030069073b426d
                        required:
                          - action
                          - tagIDs
              examples:
                empty:
                  value: {}
                fastID_configured:
                  value:
                    fastID:
                      enabled: true
                      tidSelector: TID[0]
                tagFocus_configured:
                  value:
                    tagFocus:
                      enabled: true
                tagProtect_configured:
                  value:
                    tagProtect:
                      action: enableTagProtection
                      password: '77777777'
                      tagID: e2801191a5030069073b426d
                      enableShortRange: true
                tagQuieting_configured:
                  value:
                    tagQuieting:
                      basic:
                        action: quiet
                        tagIDs:
                          - e2801191a5030069073b426d
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                default:
                  value:
                    code: 1
                    message: problem getting response for get_impinjGen2X
      security:
        - bearerAuth: []
    put:
      tags:
        - Tag Protection
        - FastID
        - TagFocus
        - Tag Quieting
      summary: Set Impinj Gen2X configuration
      description: >-
        MQTT API :- set_impinjGen2X <br> Configures Impinj Gen2X proprietary features
        (FastID, TagProtect, TagFocus, TagQuieting). At least one feature object must be
        provided. Note - start command with applyImpinjGen2X flag should be used to start
        the Gen2X operations.
      operationId: setImpinjGen2X
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: >-
                Configures Impinj Gen2X proprietary features. At least one feature object
                (fastID, tagProtect, tagFocus, or tagQuieting) must be provided.
              minProperties: 1
              properties:
                fastID:
                  type: object
                  description: >-
                    Impinj FastID embeds the tag TID along with the EPC in every inventory response,
                    eliminating the need for separate TID read operations and improving throughput.
                  properties:
                    enabled:
                      type: boolean
                      description: Enable or disable the FastID feature.
                      example: true
                    tidSelector:
                      type: string
                      description: >-
                        Optional TID word selector mask. When provided, only the specified TID
                        word is embedded in the inventory response.
                      enum:
                        - TID[0]
                        - TID[1]
                        - TID[2]
                        - TID[3]
                      example: TID[0]
                  required:
                    - enabled
                tagProtect:
                  description: >-
                    Impinj TagProtect prevents unauthorized cloning and reading of tags using
                    a password-based protection mechanism. The required fields depend on the action:
                    tagID is required for enableTagProtection and disableTagProtection and must be
                    omitted for enableTagVisibility and disableTagVisibility.
                  oneOf:
                    - type: object
                      title: Protect or Unprotect Tag
                      description: Protect or unprotect a specific tag identified by its EPC.
                      properties:
                        action:
                          type: string
                          description: Enable or disable protection for a specific tag.
                          enum:
                            - enableTagProtection
                            - disableTagProtection
                          example: enableTagProtection
                        password:
                          type: string
                          description: 8-character hexadecimal 32-bit password used for tag protection.
                          minLength: 8
                          maxLength: 8
                          pattern: ^[0-9A-Fa-f]{8}$
                          example: '77777777'
                        tagID:
                          type: string
                          description: Hexadecimal tagID (EPC) of the target tag.
                          pattern: ^[0-9A-Fa-f]+$
                          example: e2801191a5030069073b426d
                        enableShortRange:
                          type: boolean
                          description: Enables short-range protection mode for higher security.
                          example: true
                      required:
                        - action
                        - password
                        - tagID
                    - type: object
                      title: Enable or Disable Protected Tag Reading
                      description: Enable or disable the reader's ability to read protected tags.
                      properties:
                        action:
                          type: string
                          description: Enable or disable protected tag visibility on the reader.
                          enum:
                            - enableTagVisibility
                            - disableTagVisibility
                          example: enableTagVisibility
                        password:
                          type: string
                          description: 8-character hexadecimal 32-bit password used for tag protection.
                          minLength: 8
                          maxLength: 8
                          pattern: ^[0-9A-Fa-f]{8}$
                          example: '77777777'
                        enableShortRange:
                          type: boolean
                          description: Enables short-range protection mode for higher security.
                          example: false
                      required:
                        - action
                        - password
                tagFocus:
                  type: object
                  description: >-
                    Impinj TagFocus instructs tags that have already been inventoried to remain
                    unresponsive, enabling the reader to focus on other tags. TagFocus targets tags in session S1.
                  properties:
                    enabled:
                      type: boolean
                      description: Enable or disable the TagFocus feature.
                      example: true
                  required:
                    - enabled
                tagQuieting:
                  type: object
                  description: >-
                    Impinj TagQuieting selectively silences individual tags to reduce tag churn and improve read accuracy.
                  properties:
                    basic:
                      type: object
                      description: Basic TagQuieting configuration for quieting or unquieting specific tags identified by their EPC.
                      properties:
                        action:
                          type: string
                          description: quiet silences the specified tags, unquiet restores previously quieted tags.
                          enum:
                            - quiet
                            - unquiet
                          example: quiet
                        tagIDs:
                          type: array
                          description: Non-empty list of hexadecimal EPC strings identifying the tags to quiet or unquiet.
                          minItems: 1
                          items:
                            type: string
                            description: Hexadecimal EPC string of a tag.
                            pattern: ^[0-9A-Fa-f]+$
                            example: e2801191a5030069073b426d
                      required:
                        - action
                        - tagIDs
            examples:
              enable_tag_protection:
                value:
                  tagProtect:
                    action: enableTagProtection
                    password: '77777777'
                    tagID: e2801191a5030069073b426d
              disable_tag_protection:
                value:
                  tagProtect:
                    action: disableTagProtection
                    password: '77777777'
                    tagID: e2801191a5030069073b426d
              enable_tag_visibility:
                value:
                  tagProtect:
                    action: enableTagVisibility
                    password: '77777777'
              disable_tag_visibility:
                value:
                  tagProtect:
                    action: disableTagVisibility
                    password: '77777777'
              enable_short_range:
                value:
                  tagProtect:
                    action: enableTagProtection
                    password: '77777777'
                    tagID: e2801191a5030069073b426d
                    enableShortRange: true
              enable_fastid:
                value:
                  fastID:
                    enabled: true
              disable_fastid:
                value:
                  fastID:
                    enabled: false
              enable_tagfocus:
                value:
                  tagFocus:
                    enabled: true
              disable_tagfocus:
                value:
                  tagFocus:
                    enabled: false
              quiet_tags:
                value:
                  tagQuieting:
                    basic:
                      action: quiet
                      tagIDs:
                        - e2801191a5030069073b426d
                        - e2801191a5030069073b426e
              unquiet_tags:
                value:
                  tagQuieting:
                    basic:
                      action: unquiet
                      tagIDs:
                        - e2801191a5030069073b426d
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: string
                example: ''
              examples:
                default:
                  value: ''
        '422':
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Invalid payload for set_impinjGen2X api
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                default:
                  value:
                    code: 1
                    message: problem getting response for set_impinjGen2X
      security:
        - bearerAuth: []
  /cloud/start:
    post:
      tags:
        - Control Commands
      summary: Start radio with Gen2X configuration
      description: >-
        MQTT API :- start <br> Applies all staged Gen2X settings and starts the radio.
        Set applyImpinjGen2X to true for the Gen2X configuration to take effect.
      operationId: startWithImpinjGen2X
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                applyImpinjGen2X:
                  type: boolean
                  description: true to apply Gen2X config when starting the radio.
                  example: true
              required:
                - applyImpinjGen2X
            examples:
              start:
                value:
                  applyImpinjGen2X: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: string
                example: ''
              examples:
                default:
                  value: ''
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                default:
                  value:
                    code: 1
                    message: problem getting response for start
      security:
        - bearerAuth: []
  /cloud/stop:
    post:
      tags:
        - Control Commands
      summary: Stop radio
      description: >-
        MQTT API :- stop <br> Stops the radio. You must stop the radio before applying
        any Gen2X configuration changes.
      operationId: stopRadio
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
            examples:
              stop:
                value: {}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: string
                example: ''
              examples:
                default:
                  value: ''
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                default:
                  value:
                    code: 1
                    message: problem getting response for stop
      security:
        - bearerAuth: []
components:
  schemas:
    ErrorResponse:
      type: object
      properties:
        code:
          type: number
          example: 1
        message:
          type: string
          example: problem getting response
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
    bearerAuth:
      type: http
      scheme: bearer
